<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Llama AI - Fast Trainer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Courier New', monospace; background: #0a0a1a; color: #0f0; min-height: 100vh; padding: 20px; }
    h1 { text-align: center; color: #f5c542; margin-bottom: 20px; }
    .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .btn { padding: 15px 30px; font-size: 1.1em; font-family: inherit; background: #3C3B6E; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    .btn:hover { background: #5a5aaa; }
    .btn:disabled { background: #666; cursor: not-allowed; }
    .btn.start { background: #27ae60; }
    .btn.stop { background: #e74c3c; }
    .status { text-align: center; padding: 20px; margin-bottom: 20px; background: #1a1a2e; border-radius: 8px; border: 2px solid #333; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-box { background: #16213e; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #3C3B6E; }
    .stat-box .value { font-size: 2em; color: #f5c542; }
    .stat-box .label { color: #888; font-size: 0.9em; }
    .log { background: #1a1a2e; padding: 20px; border-radius: 8px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 0.85em; line-height: 1.4; margin-top: 20px; }
    .progress-bar { width: 100%; height: 20px; background: #16213e; border-radius: 10px; overflow: hidden; margin-top: 10px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #27ae60, #2ecc71); transition: width 0.3s; }
    .warn { color: #f5c542; }
    .good { color: #2ecc71; }
    .bad  { color: #e74c3c; }
  </style>
</head>
<body>
  <h1>🦙 Llama AI - Fast Trainer</h1>

  <div id="status" class="status">
    <div>Connecting to server...</div>
  </div>

  <div class="controls">
    <button class="btn start" id="startBtn" onclick="startFastTraining()">▶ Start Fast Training</button>
    <button class="btn stop"  id="stopBtn"  onclick="stopFastTraining()" disabled>⏹ Stop</button>
    <button class="btn"       onclick="testServer()">🔄 Refresh</button>
  </div>

  <div class="stats">
    <div class="stat-box"><div class="value" id="statGen">0</div><div class="label">Generation</div></div>
    <div class="stat-box"><div class="value" id="statSims">0</div><div class="label">Simulations</div></div>
    <div class="stat-box"><div class="value" id="statBestLocal">0</div><div class="label">Local Best</div></div>
    <div class="stat-box"><div class="value" id="statServerBest">0</div><div class="label">Server Best</div></div>
    <div class="stat-box"><div class="value" id="statFps">0</div><div class="label">Sims / sec</div></div>
    <div class="stat-box"><div class="value" id="statSubmitted">0</div><div class="label">Submitted</div></div>
  </div>

  <div class="stat-box" style="margin-bottom:20px">
    <div class="label">Best Network This Generation</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div id="progressText" style="margin-top:5px;color:#888">Ready</div>
  </div>

  <div class="log" id="log"></div>

<script>
console.log('[FastTrainer] Initializing Neural Network...');

class NeuralNetwork {
  constructor(inputSize, hiddenSize, outputSize) {
    this.inputSize  = inputSize;
    this.hiddenSize = hiddenSize;
    this.outputSize = outputSize;
    this.w1 = new Float32Array(inputSize  * hiddenSize);
    this.w2 = new Float32Array(hiddenSize * outputSize);
    this.b1 = new Float32Array(hiddenSize);
    this.b2 = new Float32Array(outputSize);
    this.fitness = 0;
    this.randomize();
  }
  randomize() {
    const scale1 = Math.sqrt(2 / this.inputSize);
    const scale2 = Math.sqrt(2 / this.hiddenSize);
    for (let i = 0; i < this.w1.length; i++) this.w1[i] = (Math.random()*2-1) * scale1;
    for (let i = 0; i < this.w2.length; i++) this.w2[i] = (Math.random()*2-1) * scale2;
    for (let i = 0; i < this.b1.length; i++) this.b1[i] = 0;
    for (let i = 0; i < this.b2.length; i++) this.b2[i] = 0;
  }
  clone() {
    const nn = new NeuralNetwork(this.inputSize, this.hiddenSize, this.outputSize);
    nn.w1.set(this.w1); nn.w2.set(this.w2);
    nn.b1.set(this.b1); nn.b2.set(this.b2);
    nn.fitness = this.fitness;
    return nn;
  }
  forward(inputs) {
    const hidden = new Float32Array(this.hiddenSize);
    for (let j = 0; j < this.hiddenSize; j++) {
      let s = this.b1[j];
      for (let i = 0; i < this.inputSize; i++) s += inputs[i] * this.w1[i * this.hiddenSize + j];
      hidden[j] = Math.tanh(s);
    }
    const outputs = new Float32Array(this.outputSize);
    for (let k = 0; k < this.outputSize; k++) {
      let s = this.b2[k];
      for (let j = 0; j < this.hiddenSize; j++) s += hidden[j] * this.w2[j * this.outputSize + k];
      outputs[k] = Math.tanh(s);
    }
    return outputs;
  }
  mutate(rate, sigma = 0.25) {
    for (let i = 0; i < this.w1.length; i++) if (Math.random() < rate) this.w1[i] += (Math.random()*2-1)*sigma;
    for (let i = 0; i < this.w2.length; i++) if (Math.random() < rate) this.w2[i] += (Math.random()*2-1)*sigma;
    for (let i = 0; i < this.b1.length; i++) if (Math.random() < rate) this.b1[i] += (Math.random()*2-1)*sigma;
    for (let i = 0; i < this.b2.length; i++) if (Math.random() < rate) this.b2[i] += (Math.random()*2-1)*sigma;
  }
}

const W = 800, H = 450;
const LW = 14, LH = 18;

function createLevel(n) {
  const ground = { x: 0, y: 390, w: 800, h: 60 };
  if (n === 1) {
    return {
      platforms: [ground, { x: 150, y: 310, w: 100, h: 16 }, { x: 300, y: 250, w: 100, h: 16 }, { x: 460, y: 300, w: 100, h: 16 }, { x: 600, y: 240, w: 120, h: 16 }, { x:  50, y: 220, w:  80, h: 16 }],
      hazards: [{ x: 220, y: 376, w: 24, h: 14 }, { x: 430, y: 376, w: 24, h: 14 }, { x: 590, y: 376, w: 24, h: 14 }],
      enemies: [{ x: 350, y: 362, w: 32, h: 28, vx: 1.5, patrolA: 290, patrolB: 410, type: 'walker', dead: false }, { x: 550, y: 362, w: 32, h: 28, vx: 1.5, patrolA: 480, patrolB: 620, type: 'walker', dead: false }, { x: 200, y: 282, w: 32, h: 28, vx: 1.2, patrolA: 150, patrolB: 250, type: 'patroller', dead: false }, { x: 300, y: 190, w: 36, h: 36, vx: 1.2, patrolA: 160, patrolB: 440, type: 'ginger', dead: false, baseY: 190, floatTimer: 0 }, { x: 500, y: 150, w: 36, h: 36, vx: 1.2, patrolA: 360, patrolB: 640, type: 'ginger', dead: false, baseY: 150, floatTimer: 1.5 }],
      coins: [{ x: 175, y: 295, collected: false }, { x: 200, y: 295, collected: false }, { x: 225, y: 295, collected: false }, { x: 325, y: 235, collected: false }, { x: 350, y: 235, collected: false }, { x: 625, y: 225, collected: false }, { x: 650, y: 225, collected: false }, { x: 675, y: 225, collected: false }],
      flag: { x: 720, y: 300, w: 20, h: 90 }, startX: 60, startY: 372,
    };
  }
  if (n === 2) {
    return {
      platforms: [ground, { x: 60, y: 320, w: 130, h: 16 }, { x: 240, y: 280, w: 130, h: 16 }, { x: 420, y: 240, w: 130, h: 16 }, { x: 590, y: 280, w: 160, h: 16 }, { x: 150, y: 190, w: 110, h: 16 }, { x: 470, y: 160, w: 110, h: 16 }],
      hazards: [{ x: 340, y: 376, w: 24, h: 14 }, { x: 570, y: 376, w: 24, h: 14 }],
      enemies: [{ x: 280, y: 362, w: 32, h: 28, vx: 1.5, patrolA: 200, patrolB: 360, type: 'walker', dead: false }, { x: 460, y: 362, w: 32, h: 28, vx: 1.5, patrolA: 380, patrolB: 540, type: 'walker', dead: false }, { x: 620, y: 252, w: 32, h: 28, vx: 1.2, patrolA: 590, patrolB: 740, type: 'patroller', dead: false }, { x: 200, y: 140, w: 36, h: 36, vx: 1.2, patrolA:  60, patrolB: 340, type: 'ginger', dead: false, baseY: 140, floatTimer: 0.5 }, { x: 450, y: 110, w: 36, h: 36, vx: 1.2, patrolA: 310, patrolB: 590, type: 'ginger', dead: false, baseY: 110, floatTimer: 2.1 }, { x: 620, y: 160, w: 36, h: 36, vx: 1.0, patrolA: 480, patrolB: 760, type: 'ginger', dead: false, baseY: 160, floatTimer: 0.8 }, { x: 350, y: 40, w: 40, h: 34, type: 'volanradooga', dead: false, baseX: 350, baseY: 40, floatTimer: 0.0, vx: 0, vy: 0, state: 'patrol', attackCooldown: 0, chaseTimer: 0 }],
      coins: [{ x: 80, y: 305, collected: false }, { x: 110, y: 305, collected: false }, { x: 255, y: 265, collected: false }, { x: 285, y: 265, collected: false }, { x: 490, y: 145, collected: false }, { x: 520, y: 145, collected: false }],
      flag: { x: 730, y: 240, w: 20, h: 90 }, startX: 60, startY: 372,
    };
  }
  return createLevel(1);
}

const GRAVITY = 0.55, JUMP_F = -12, MOVE_SPD = 3.5, MAX_FRAMES = 2400;

function simulateNetwork(network, levelNum = 1) {
  const level = createLevel(levelNum);
  const totalCoins = level.coins.length, totalEnemies = level.enemies.length;
  let x = level.startX, y = level.startY, vx = 0, vy = 0, onGround = true, facing = 1;
  const enemies = level.enemies.map(e => ({ ...e }));
  let coinsCollected = 0, enemiesKilled = 0, score = 0, maxX = x, stagnation = 0, totalStagnantFrames = 0, frames = 0, alive = true, reachedFlag = false;
  const startX = x;

  while (frames < MAX_FRAMES && alive && !reachedFlag) {
    for (const e of enemies) {
      if (e.dead) continue;
      if (e.type === 'volanradooga') {
        e.floatTimer += 0.04; if (e.attackCooldown > 0) e.attackCooldown--;
        const dx = (x + LW) - (e.x + e.w/2), dy = (y + LH) - (e.y + e.h/2), dist = Math.sqrt(dx*dx + dy*dy), AGGRO = 180;
        if (e.state === 'patrol') { e.x = e.baseX + Math.sin(e.floatTimer * 0.7) * 110; e.y = e.baseY + Math.sin(e.floatTimer * 1.3) * 18; if (dist < AGGRO) { e.state = 'chase'; e.chaseTimer = 0; } }
        else if (e.state === 'chase') { e.vx = (e.vx || 0) + Math.sign(dx) * 0.35; e.vy = (e.vy || 0) + Math.sign(dy) * 0.25; e.vx = Math.max(-4.5, Math.min(4.5, e.vx)); e.vy = Math.max(-4, Math.min(4, e.vy)); e.x += e.vx; e.y += e.vy; e.chaseTimer++; if (e.y < 10) { e.y = 10; e.vy = Math.abs(e.vy); } if (e.y > H * 0.55) { e.y = H * 0.55; e.vy = -Math.abs(e.vy); } if (dist < 60 && e.attackCooldown === 0) e.state = 'attack'; if (dist > AGGRO * 1.4 || e.chaseTimer > 200) e.state = 'retreat'; }
        else if (e.state === 'attack') { e.vx = dx / 12; e.vy = dy / 12; e.x += e.vx; e.y += e.vy; e.attackCooldown = 90; e.state = 'retreat'; }
        else if (e.state === 'retreat') { e.vx = (e.vx || 0) + (e.baseX - e.x) * 0.02; e.vy = (e.vy || 0) + (e.baseY - e.y) * 0.02; e.vx *= 0.88; e.vy *= 0.88; e.x += e.vx; e.y += e.vy; const retDist = Math.hypot(e.x - e.baseX, e.y - e.baseY); if (retDist < 20) e.state = 'patrol'; if (dist < AGGRO && e.attackCooldown === 0) e.state = 'chase'; }
        e.x = Math.max(0, Math.min(W - e.w, e.x)); e.y = Math.max(5, Math.min(H * 0.6, e.y)); continue;
      }
      e.x += e.vx; if (e.x < e.patrolA || e.x > e.patrolB) e.vx = -e.vx;
      if (e.type === 'ginger') { e.floatTimer += 0.06; e.y = e.baseY + Math.sin(e.floatTimer) * 22; }
    }
    const inputs = new Float32Array(52); let idx = 0;
    inputs[idx++] = x / W; inputs[idx++] = (W - x) / W; inputs[idx++] = y / H; inputs[idx++] = y / H;
    inputs[idx++] = (vx + 5) / 10; inputs[idx++] = (vy + 15) / 30; inputs[idx++] = onGround ? 1 : 0; inputs[idx++] = facing > 0 ? 1 : 0;
    inputs[idx++] = 0; inputs[idx++] = 0; inputs[idx++] = 0;
    inputs[idx++] = (level.flag.x - x) / W; inputs[idx++] = (level.flag.y - y) / H; inputs[idx++] = 1 - (frames / MAX_FRAMES);
    const sortedPlats = level.platforms.slice().sort((a, b) => Math.abs((a.x + a.w/2) - x) - Math.abs((b.x + b.w/2) - x));
    for (let i = 0; i < 8; i++) { if (i < sortedPlats.length) { inputs[idx++] = sortedPlats[i].x / W; inputs[idx++] = sortedPlats[i].y / H; inputs[idx++] = sortedPlats[i].w / W; } else { inputs[idx++] = 0; inputs[idx++] = 0; inputs[idx++] = 0; } }
    const liveEnemies = enemies.filter(e => !e.dead).sort((a, b) => Math.abs(a.x - x) - Math.abs(b.x - x));
    for (let i = 0; i < 3 && idx + 3 < 52; i++) { if (i < liveEnemies.length) { const e = liveEnemies[i]; inputs[idx++] = e.x / W; inputs[idx++] = e.y / H; inputs[idx++] = e.w / W; inputs[idx++] = e.type === 'volanradooga' ? 1 : (e.type === 'ginger' ? 0.5 : 0); } else { inputs[idx++] = 0; inputs[idx++] = 0; inputs[idx++] = 0; inputs[idx++] = 0; } }
    while (idx < 52) inputs[idx++] = 0;
    const out = network.forward(inputs);
    if (out[0] > 0.5) { vx = -MOVE_SPD; facing = -1; } else if (out[1] > 0.5) { vx =  MOVE_SPD; facing =  1; } else { vx = 0; }
    if (out[2] > 0.4 && onGround) { vy = JUMP_F; onGround = false; }
    vy += GRAVITY; x += vx; y += vy; x = Math.max(LW, Math.min(W - LW, x));
    onGround = false; for (const p of level.platforms) { if (x + LW > p.x && x - LW < p.x + p.w) { if (vy >= 0 && y + LH >= p.y && y + LH <= p.y + vy + 2 && y < p.y) { y = p.y - LH; vy = 0; onGround = true; break; } } }
    for (const sp of level.hazards) { if (x + LW > sp.x && x - LW < sp.x + sp.w && y + LH > sp.y && y - LH < sp.y + sp.h) { alive = false; break; } }
    if (!alive || y > H + 60) { alive = false; break; }
    for (const e of enemies) { if (e.dead) continue; const ex = e.x + e.w / 2, ey = e.y + e.h / 2, edx = Math.abs(x - ex), edy = Math.abs(y - ey); if (edx < LW + e.w / 2 - 4 && edy < LH + e.h / 2 - 4) { if (vy > 0 && y + LH < ey + 6) { e.dead = true; enemiesKilled++; score += 200; vy = -8; } else { alive = false; } break; } }
    if (!alive) break;
    for (const c of level.coins) { if (!c.collected && Math.abs(x - c.x) < LW + 10 && Math.abs(y - c.y) < LH + 10) { c.collected = true; coinsCollected++; score += 100; } }
    if (x + LW > level.flag.x && x - LW < level.flag.x + level.flag.w && y + LH > level.flag.y && y - LH < level.flag.y + level.flag.h) { reachedFlag = true; score += 5000; break; }
    if (x > maxX + 2) { maxX = x; stagnation = 0; } else { stagnation++; totalStagnantFrames++; }
    if (stagnation > 240) break;
    frames++;
  }
  const dxF = x - level.flag.x, dyF = y - (level.flag.y + 45), distToFlag = Math.sqrt(dxF*dxF + dyF*dyF);
  const proximityReward = (1.0 - Math.min(1, distToFlag / W)) * 5000;
  const completionMultiplier = reachedFlag ? 5.0 : 1.0;
  const deathPenalty = !alive ? (12000 * (1.0 - (x / W))) : 0;
  let fitness = ((proximityReward + (enemiesKilled*450) + (coinsCollected*350) + score) * completionMultiplier) + (reachedFlag ? 25000 : 0) - (totalStagnantFrames*4) - (frames*0.3) - deathPenalty;
  if (!reachedFlag && maxX < startX + 50) fitness = Math.min(fitness, 500);
  return { fitness, score, coinsCollected, enemiesKilled, maxX, frames, alive, reachedFlag, fullClear: reachedFlag && enemiesKilled === totalEnemies && coinsCollected === totalCoins };
}

function evaluateNetwork(network) {
  const runs = [1, 2, 1, 2, 1].map(l => simulateNetwork(network, l));
  const levelsCleared = runs.filter(r => r.reachedFlag).length, fullClears = runs.filter(r => r.fullClear).length;
  const campaignMult = 1.0 + (levelsCleared * 0.5), campaignBonus = (levelsCleared * 20000) + (fullClears * 15000);
  const weightedFitness = (runs[0].fitness * 1.0) + (runs[1].fitness * 1.1) + (runs[2].fitness * 1.2) + (runs[3].fitness * 1.3) + (runs[4].fitness * 1.4);
  return { fitness: (weightedFitness * campaignMult) + campaignBonus, reachedFlag: levelsCleared >= 5, enemiesKilled: runs.reduce((s, r) => s + r.enemiesKilled, 0), coinsCollected: runs.reduce((s, r) => s + r.coinsCollected, 0), maxX: Math.max(...runs.map(r => r.maxX)), alive: runs.every(r => r.alive), levelsCleared, fullClears };
}

const CONFIG = { populationSize: 60, eliteCount: 6, mutationRate: 0.12, mutationSigma: 0.22, batchSize: 10 };
let population = [], generation = 0, totalSimulations = 0, totalSubmitted = 0, isRunning = false, localBestFitness = -Infinity, lastFpsTime = 0, simsSinceLastFps = 0, lastServerSubmitTime = 0;

function log(msg, cls) {
  const div = document.createElement('div'); div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  if (cls) div.className = cls; const logEl = document.getElementById('log'); logEl.insertBefore(div, logEl.firstChild);
  if (logEl.children.length > 80) logEl.removeChild(logEl.lastChild);
}

function initPopulation(serverNetworks = []) {
  population = [];
  for (const nd of serverNetworks) {
    try {
      const nn = new NeuralNetwork(52, 48, 6);
      if (nn.w1.length !== nd.w1?.length || nn.w2.length !== nd.w2?.length) continue;
      nn.w1.set(nd.w1); nn.w2.set(nd.w2); nn.b1.set(nd.b1); nn.b2.set(nd.b2);
      nn.fitness = nd.fitness; nn.externalScore = typeof nd.aiScore === "number" ? nd.aiScore : 0; nn.serverId = nd.id || null;
      population.push(nn);
    } catch (e) { }
  }
  const sCount = population.length; while (population.length < CONFIG.populationSize) population.push(new NeuralNetwork(52, 48, 6));
  generation = 0; log(`Population ready: ${sCount} from server + ${population.length - sCount} random`, 'good');
}

function tournamentSelect(k = 5) {
  let best = null; for (let i = 0; i < k; i++) { const c = population[Math.floor(Math.random() * population.length)]; if (!best || c.fitness > best.fitness) best = c; }
  return best;
}

function evolve() {
  population.sort((a, b) => b.fitness - a.fitness); const best = population[0];
  if (best.fitness > localBestFitness) { localBestFitness = best.fitness; document.getElementById('statBestLocal').textContent = Math.floor(localBestFitness); }
  log(`Gen ${generation} — best: ${best.fitness.toFixed(0)}  cleared: ${best.levelsCleared || 0}/5  campaign: ${best.reachedFlag ? '🏆' : '-'}`, best.reachedFlag ? 'good' : best.fitness > 0 ? '' : 'bad');
  const newPop = []; for (let i = 0; i < CONFIG.eliteCount; i++) newPop.push(population[i].clone());
  while (newPop.length < CONFIG.populationSize) {
    const parent = tournamentSelect(5), child = parent.clone();
    if (Math.random() < 0.3) { const other = tournamentSelect(5); for (let i = 0; i < child.w1.length; i++) if (Math.random() < 0.5) child.w1[i] = other.w1[i]; for (let i = 0; i < child.w2.length; i++) if (Math.random() < 0.5) child.w2[i] = other.w2[i]; }
    child.mutate(best.fitness < 0 ? CONFIG.mutationRate * 2 : CONFIG.mutationRate, best.fitness < 0 ? CONFIG.mutationSigma * 1.5 : CONFIG.mutationSigma);
    child.fitness = 0; newPop.push(child);
  }
  population = newPop; generation++; document.getElementById('statGen').textContent = generation;
}

let evalIndex = 0;
async function runBatch() {
  if (!isRunning) return;
  const bSize = 8, end = Math.min(evalIndex + bSize, population.length);
  for (let i = evalIndex; i < end; i++) {
    await new Promise(resolve => setTimeout(() => {
      const result = evaluateNetwork(population[i]);
      population[i].localFitness = result.fitness;
      population[i].fitness = (result.fitness * 0.75) + ((population[i].externalScore || 0) * 0.25);
      population[i].reachedFlag = result.reachedFlag; population[i].maxX = result.maxX; population[i].levelsCleared = result.levelsCleared; population[i].fullClears = result.fullClears;
      totalSimulations += 5; simsSinceLastFps += 5; resolve();
    }, 0));
  }
  evalIndex = end;
  if (evalIndex >= population.length) {
    await submitBest(); evolve();
    if (generation % 10 === 0) await syncTopServerNetworks();
    evalIndex = 0;
    const best = population[0]; const pct = Math.min(100, Math.max(0, ((best.maxX || 0) - 60) / (W - 60) * 100));
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `Gen ${generation}: maxX=${Math.floor(best.maxX || 0)}  fitness=${best.fitness.toFixed(0)}` + (best.reachedFlag ? '  🏁 FLAG!' : '  ✓eval');
  } else {
    document.getElementById('progressFill').style.width = (evalIndex / population.length * 100) + '%';
    document.getElementById('progressText').textContent = `Gen ${generation}: evaluating ${evalIndex}/${population.length}...`;
  }
  document.getElementById('statSims').textContent = totalSimulations;
  const now = performance.now(); if (now - lastFpsTime > 1000) { document.getElementById('statFps').textContent = Math.round(simsSinceLastFps * 1000 / (now - lastFpsTime)); simsSinceLastFps = 0; lastFpsTime = now; }
  if (isRunning) requestAnimationFrame(runBatch);
}

// ═══════════════════════════════════════════════════════════════════════
//  SERVER / UI CONTROLS
// ═══════════════════════════════════════════════════════════════════════
const localUrl = window.location.origin.startsWith('http') ? window.location.origin : 'http://localhost:3000';
const remoteUrl = 'https://llamagame-ai-server.wascomb.com';
let currentServerUrl = localUrl;

async function testServer() {
  console.log('[FastTrainer] Initializing server discovery...');
  const statusEl = document.getElementById('status');
  if (!statusEl) return false;
  
  console.log('[FastTrainer] Testing Local:', localUrl);
  try {
    const r = await fetch(localUrl + '/health', { mode: 'cors', cache: 'no-store' });
    if (r.ok) {
      const h = await r.json();
      currentServerUrl = localUrl;
      console.log('[FastTrainer] Local Server Found:', h);
      statusEl.innerHTML = `<div style="color:#0f0">🟢 Local Server Online — Networks: ${h.networks}</div>`;
      document.getElementById('statServerBest').textContent = Math.floor(h.bestFitness || 0);
      return true;
    }
  } catch (e) { console.warn('[FastTrainer] Local server unreachable:', e.message); }

  console.log('[FastTrainer] Testing Remote Fallback:', remoteUrl);
  try {
    const r = await fetch(remoteUrl + '/health', { mode: 'cors', cache: 'no-store' });
    if (r.ok) {
      const h = await r.json();
      currentServerUrl = remoteUrl;
      console.log('[FastTrainer] Remote Server Found:', h);
      statusEl.innerHTML = `<div style="color:#f5c542">🟡 Remote Server Online (Cloudflare) — Networks: ${h.networks}</div>`;
      document.getElementById('statServerBest').textContent = Math.floor(h.bestFitness || 0);
      return true;
    }
  } catch (e) {
    console.error('[FastTrainer] All server checks failed.');
    statusEl.innerHTML = `<div style="color:#f00">🔴 All Servers Offline</div>`;
  }
  return false;
}

async function fetchServerNetworks() {
  try {
    const r = await fetch(currentServerUrl + '/api/networks?source=tested&limit=30');
    if (r.ok) { const d = await r.json(); return d.networks || []; }
  } catch (e) { }
  return [];
}

async function syncTopServerNetworks() {
  try {
    const r = await fetch(currentServerUrl + '/api/networks?source=tested&limit=20');
    if (!r.ok) return;
    const d = await r.json(); const strong = (d.networks || []).filter(n => (n.aiEvaluations || 0) > 0); if (strong.length === 0) return;
    for (const nd of strong.slice(0, 5)) {
      const nn = new NeuralNetwork(52, 48, 6);
      if (nn.w1.length !== nd.w1?.length || nn.w2.length !== nd.w2?.length) continue;
      nn.w1.set(nd.w1); nn.w2.set(nd.w2); nn.b1.set(nd.b1); nn.b2.set(nd.b2);
      nn.externalScore = typeof nd.aiScore === 'number' ? nd.aiScore : 0; nn.fitness = nd.fitness; nn.serverId = nd.id || null;
      population.push(nn);
    }
    population.sort((a, b) => b.fitness - a.fitness); population = population.slice(0, CONFIG.populationSize);
    log('Synced networks from ' + (currentServerUrl.includes('wascomb') ? 'Remote' : 'Local') + ' server.', 'good');
  } catch (e) { log(`Server sync error: ${e.message}`, 'warn'); }
}

async function startFastTraining() {
  if (isRunning) return;
  await testServer(); log('Connecting to server...', 'warn'); const serverNets = await fetchServerNetworks();
  if (serverNets.length > 0) log(`⚠️  Loaded ${serverNets.length} networks from ${currentServerUrl}.`, 'warn');
  initPopulation(serverNets); isRunning = true; evalIndex = 0;
  document.getElementById('startBtn').disabled = true; document.getElementById('stopBtn').disabled = false;
  log('Training started.', 'good'); lastFpsTime = performance.now(); requestAnimationFrame(runBatch);
}

function stopFastTraining() { isRunning = false; document.getElementById('startBtn').disabled = false; document.getElementById('stopBtn').disabled = true; log('Training stopped.'); }

async function submitBest() {
  if (generation % 10 !== 0) return;
  const now = Date.now(); if (now - lastServerSubmitTime < 60000) return; lastServerSubmitTime = now;
  population.sort((a, b) => b.fitness - a.fitness); const toSubmit = population.slice(0, 10).filter(n => (n.levelsCleared || 0) > 0);
  if (toSubmit.length === 0) { log(`Gen ${generation}: No level clears found — skipping server submission`, 'warn'); return; }
  try {
    const resp = await fetch(currentServerUrl + '/api/networks', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ networks: toSubmit.map(n => ({ fitness: (n.localFitness ?? n.fitness), trainerFitness: (n.localFitness ?? n.fitness), hiddenSize: 48, w1: Array.from(n.w1), w2: Array.from(n.w2), b1: Array.from(n.b1), b2: Array.from(n.b2), producer: "fast_trainer", actionProfile: "movement3", trainingStats: { levelsCleared: n.levelsCleared || 0, fullClears: n.fullClears || 0, blendedFitness: n.fitness }, })) })
    });
    if (resp.ok) { const r = await resp.json(); totalSubmitted += r.added; document.getElementById('statSubmitted').textContent = totalSubmitted; log(`Submitted ${r.added} networks to ${currentServerUrl.includes('wascomb') ? 'Remote' : 'Local'}`, 'good'); await syncTopServerNetworks(); }
  } catch (e) { log(`Submit error: ${e.message}`, 'bad'); }
}

window.addEventListener('DOMContentLoaded', () => {
  console.log('[FastTrainer] Page Loaded. Starting connection test...');
  testServer();
});
</script>
