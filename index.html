<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDIOCRE LLAMA LEAP 🦙</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    height: 100vh;
    max-height: 100dvh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    padding: 4px 8px;
    box-sizing: border-box;
  }

  #title {
    font-size: clamp(0.5rem, 2.2vw, 1.8rem);
    margin-bottom: 4px;
    letter-spacing: clamp(1px, 0.4vw, 4px);
    animation: rainbowText 1s linear infinite;
    white-space: nowrap;
    flex-shrink: 0;
  }

  @keyframes rainbowText {
    0%   { color: #B22234; text-shadow: 4px 4px #3C3B6E, 8px 8px #800000; }
    33%  { color: #FFFFFF; text-shadow: 4px 4px #B22234, 8px 8px #3C3B6E; }
    66%  { color: #3C3B6E; text-shadow: 4px 4px #B22234, 8px 8px #000060; }
    100% { color: #B22234; text-shadow: 4px 4px #3C3B6E, 8px 8px #800000; }
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 4px 4px #c0392b, 8px 8px #7d1a0f; }
    50% { text-shadow: 4px 4px #e74c3c, 8px 8px #c0392b, 0 0 30px #f5c542; }
  }

  #hud {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 2px 16px;
    margin-bottom: 4px;
    color: #fff;
    font-size: clamp(0.22rem, 1.1vw, 0.5rem);
    animation: rainbowText 1.4s linear infinite;
    width: 100%;
    max-width: 800px;
    line-height: 1.4;
  }

  #hud span { color: #fff; }

  #gameCanvas {
    border: 4px solid #fff;
    box-shadow: 0 0 30px rgba(245, 197, 66, 0.4), inset 0 0 30px rgba(0,0,0,0.5);
    display: block;
    image-rendering: pixelated;
    animation: rainbowBorder 1s linear infinite;
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
  }

  @keyframes rainbowBorder {
    0%   { border-color: #B22234; box-shadow: 0 0 24px #B22234; }
    33%  { border-color: #FFFFFF; box-shadow: 0 0 24px #FFFFFF; }
    66%  { border-color: #3C3B6E; box-shadow: 0 0 24px #3C3B6E; }
    100% { border-color: #B22234; box-shadow: 0 0 24px #B22234; }
  }

  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    text-align: center;
  }

  #overlay h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 1.5rem;
    color: #f5c542;
    text-shadow: 3px 3px #c0392b;
  }

  #overlay p {
    font-family: 'VT323', monospace;
    font-size: 1.4rem;
    color: #eee;
    line-height: 1.6;
  }

  #overlay .blink {
    animation: blink 1s step-end infinite;
    color: #f5c542;
    font-size: 1.2rem;
  }

  @keyframes blink { 50% { opacity: 0; } }

  #controls {
    color: #888;
    font-size: clamp(0.25rem, 0.8vw, 0.4rem);
    margin-top: 4px;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  /* ── LAYOUT (AtomSmasher101 — scales to fit all elements) ──────────────── */
  #gameWrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    max-width: 800px;
  }

  #touchControls {
    display: none;
    width: 100%;
    max-width: 800px;
    padding: 10px 6px 4px;
    justify-content: space-between;
    align-items: flex-end;
    gap: 8px;
    user-select: none;
  }

  .touch-group {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .touch-btn {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.12);
    color: #fff;
    font-size: 1.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.08s, transform 0.08s;
    backdrop-filter: blur(4px);
  }

  .touch-btn:active, .touch-btn.pressed {
    background: rgba(255,255,255,0.35);
    transform: scale(0.92);
    border-color: #fff;
  }

  .touch-btn.wide {
    width: 90px;
    border-radius: 34px;
    font-size: 1.2rem;
  }

  #title {
    font-size: clamp(0.7rem, 3.5vw, 2rem);
  }

  #hud {
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px 20px;
    font-size: clamp(0.3rem, 1.8vw, 0.55rem);
  }

  @media (max-width: 600px) {
    #touchControls { display: flex; }
    #controls { display: none; }

    html, body { height: 100%; overflow: hidden; }
    body { justify-content: flex-start; padding: 4px 4px 0; }

    #touchControls { flex: 0 0 auto; padding: 6px 8px 8px; width: 100%; }
    .touch-btn { width: 58px; height: 58px; font-size: 1.3rem; }
    .touch-btn.wide { width: 76px; font-size: 1rem; }
  }
</style>
</head>
<body>

<div id="title">🦙 MEDIOCRE LLAMA LEAP 🦙</div>
<div id="hud">
  <div>SCORE: <span id="scoreDisplay">0</span></div>
  <div>LIVES: <span id="livesDisplay">3</span></div>
  <div>LEVEL: <span id="levelDisplay">1</span></div>
  <div>⏱ <span id="timerDisplay">1:00</span></div>
  <div>AMMO: <span id="ammoDisplay">🔫—</span></div>
  <div>SQUASHIE: <span id="squashieDisplay">🍬—</span></div>
  <div>WIG: <span id="wigDisplay">👶—</span></div>
</div>
<div id="gameWrapper">
<canvas id="gameCanvas" width="800" height="450"></canvas>
</div>
<div id="controls">ARROW KEYS / WASD — JUMP &amp; MOVE &nbsp;|&nbsp; SPACE — SPIT 🫗 &nbsp;|&nbsp; G / F — SHOOT 🔫</div>

<!-- Touch controls (added by Pratchetty) -->
<div id="touchControls">
  <div class="touch-group">
    <button class="touch-btn" id="btn-left">◀</button>
    <button class="touch-btn" id="btn-right">▶</button>
  </div>
  <div class="touch-group">
    <button class="touch-btn wide" id="btn-spit">🫗 SPIT</button>
    <button class="touch-btn wide" id="btn-shoot">🔫 FIRE</button>
    <button class="touch-btn" id="btn-jump">▲ JUMP</button>
  </div>
</div>

<div id="overlay">
  <h2>🦙 MEDIOCRE LLAMA LEAP 🦙</h2>
  <p>Dodge spikes, stomp enemies,<br>and reach the flag!</p>
  <p class="blink">PRESS ENTER TO START</p>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const W = canvas.width, H = canvas.height;

// ── STATE ──────────────────────────────────────────────────────────────────
let state = 'title'; // title | playing | dead | win
let score = 0, lives = 3, level = 1;
let frameCount = 0;

// ── RAINBOW (added by Pratchetty) ──────────────────────────────────────────
function rb(offset = 0, alpha = 1) {
  const h = ((frameCount * 3) + offset) % 360;
  return `hsla(${h}, 100%, 55%, ${alpha})`;
}
function rbDark(offset = 0) {
  const h = ((frameCount * 3) + offset) % 360;
  return `hsl(${h}, 100%, 30%)`;
}
function rbLight(offset = 0) {
  const h = ((frameCount * 3) + offset) % 360;
  return `hsl(${h}, 100%, 80%)`;
}

// ── COLOURS ────────────────────────────────────────────────────────────────
const SKY = ['#1a1a2e','#16213e','#0f3460'];
const GROUND_TOP = '#7ec850';
const GROUND_BOT = '#5a8f2e';
const DIRT = '#8B6914';

// ── LLAMA ──────────────────────────────────────────────────────────────────
function makeLlama(x, y) {
  return {
    x, y, w: 28, h: 36,
    vx: 0, vy: 0,
    onGround: false,
    facing: 1,
    frame: 0,
    frameTimer: 0,
    dead: false,
    invincible: 0,
    spitCooldown: 0,
    gunAmmo: 0,
    shootCooldown: 0,
    squashiePower: 0,   // frames remaining of squashie powerup (added by TheMediocreLlama)
    gingerWig: 0,       // frames remaining of ginger wig (added by Middors)
  };
}

// ── PHYSICS ────────────────────────────────────────────────────────────────
const GRAVITY = 0.55, JUMP_F = -12, MOVE_SPD = 3.5;

// ── LEVEL DATA ─────────────────────────────────────────────────────────────
function buildLevel(n) {
  const platforms = [
    { x: 0, y: 390, w: 800, h: 60, type: 'ground' },
  ];
  const hazards = [], enemies = [], coins = [];
  let flagX = 720;

  if (n === 1) {
    platforms.push(
      { x: 150, y: 310, w: 100, h: 16, type: 'plat' },
      { x: 300, y: 250, w: 100, h: 16, type: 'plat' },
      { x: 460, y: 300, w: 100, h: 16, type: 'plat' },
      { x: 600, y: 240, w: 120, h: 16, type: 'plat' },
      { x:  50, y: 220, w:  80, h: 16, type: 'plat' },
    );
    hazards.push(
      { x: 220, y: 376, w: 24, h: 14, type: 'spike' },
      { x: 430, y: 376, w: 24, h: 14, type: 'spike' },
      { x: 590, y: 376, w: 24, h: 14, type: 'spike' },
    );
    enemies.push(
      makeEnemy(350, 340, 'walker'),
      makeEnemy(550, 280, 'walker'),
      makeEnemy(200, 290, 'patroller', 150, 250),
      makeGinger(300, 180), makeGinger(500, 150),
    );
    coins.push(...coinRow(155, 295, 5), ...coinRow(305, 235, 4), ...coinRow(610, 225, 4));

  } else if (n === 2) {
    // Redesigned by AtomSmasher101 — baby Jimmy (0.5 scale) appears
    platforms.push(
      { x:  60, y: 320, w: 130, h: 16, type: 'plat' },
      { x: 240, y: 280, w: 130, h: 16, type: 'plat' },
      { x: 420, y: 240, w: 130, h: 16, type: 'plat' },
      { x: 590, y: 280, w: 160, h: 16, type: 'plat' },
      { x: 150, y: 190, w: 110, h: 16, type: 'plat' },
      { x: 470, y: 160, w: 110, h: 16, type: 'plat' },
    );
    hazards.push(
      { x: 340, y: 376, w: 24, h: 14, type: 'spike' },
      { x: 570, y: 376, w: 24, h: 14, type: 'spike' },
    );
    enemies.push(
      makeEnemy(280, 264, 'walker'),
      makeEnemy(460, 224, 'walker'),
      makeEnemy(620, 264, 'patroller', 590, 740),
      makeGinger(200, 140), makeGinger(450, 110), makeGinger(620, 160),
      makeJimmy(400, 390, 0.5),   // baby Jimmy
    );
    coins.push(...coinRow(70, 305, 5), ...coinRow(245, 265, 5), ...coinRow(475, 145, 5));
    flagX = 730;

  } else if (n === 3) {
    // Chaos — two baby Jimmies (0.55 scale)
    platforms.push(
      { x:  80, y: 340, w:  70, h: 16, type: 'plat' },
      { x: 210, y: 290, w:  70, h: 16, type: 'plat' },
      { x: 340, y: 230, w:  70, h: 16, type: 'plat' },
      { x: 470, y: 170, w:  70, h: 16, type: 'plat' },
      { x: 570, y: 230, w:  70, h: 16, type: 'plat' },
      { x: 650, y: 300, w: 130, h: 16, type: 'plat' },
      { x: 200, y: 160, w:  60, h: 16, type: 'plat' },
      { x: 350, y: 110, w:  60, h: 16, type: 'plat' },
    );
    for (let sx = 140; sx < 680; sx += 80)
      hazards.push({ x: sx, y: 376, w: 24, h: 14, type: 'spike' });
    enemies.push(
      makeEnemy(220, 274, 'walker'),
      makeEnemy(350, 214, 'walker'),
      makeEnemy(480, 154, 'walker'),
      makeEnemy(580, 214, 'walker'),
      makeEnemy(660, 284, 'patroller', 650, 770),
      makeEnemy(100, 375, 'patroller', 50, 200),
      makeGinger(150, 120), makeGinger(350, 80), makeGinger(520, 100), makeGinger(680, 130),
      makeJimmy(250, 390, 0.55),  // baby Jimmy left
      makeJimmy(560, 390, 0.55),  // baby Jimmy right
    );
    coins.push(...coinRow(215, 145, 3), ...coinRow(355, 95, 3), ...coinRow(475, 155, 3));
    flagX = 740;

  } else if (n === 4) {
    // Gauntlet — three baby Jimmies (0.65 scale), more platforms
    platforms.push(
      { x: 100, y: 330, w:  90, h: 16, type: 'plat' },
      { x: 240, y: 270, w:  90, h: 16, type: 'plat' },
      { x: 380, y: 210, w:  90, h: 16, type: 'plat' },
      { x: 520, y: 260, w:  90, h: 16, type: 'plat' },
      { x: 630, y: 310, w: 130, h: 16, type: 'plat' },
      { x:  50, y: 210, w:  70, h: 16, type: 'plat' },
      { x: 300, y: 150, w:  80, h: 16, type: 'plat' },
      { x: 500, y: 130, w:  80, h: 16, type: 'plat' },
    );
    for (let sx = 160; sx < 640; sx += 70)
      hazards.push({ x: sx, y: 376, w: 24, h: 14, type: 'spike' });
    enemies.push(
      makeEnemy(260, 254, 'walker'),
      makeEnemy(400, 194, 'walker'),
      makeEnemy(540, 244, 'walker'),
      makeEnemy(660, 294, 'patroller', 630, 755),
      makeGinger(120, 100), makeGinger(320, 80), makeGinger(510, 75), makeGinger(680, 100),
      makeJimmy(200, 390, 0.65),
      makeJimmy(420, 390, 0.65),
      makeJimmy(620, 390, 0.65),
    );
    coins.push(...coinRow(105, 315, 4), ...coinRow(305, 135, 4), ...coinRow(505, 115, 4));
    flagX = 740;

  } else {
    // Level 5 — THE REAL JIMMY. Full size, max chaos
    platforms.push(
      { x:  60, y: 340, w:  80, h: 16, type: 'plat' },
      { x: 190, y: 280, w:  80, h: 16, type: 'plat' },
      { x: 320, y: 220, w:  80, h: 16, type: 'plat' },
      { x: 450, y: 160, w:  80, h: 16, type: 'plat' },
      { x: 560, y: 220, w:  80, h: 16, type: 'plat' },
      { x: 640, y: 290, w: 120, h: 16, type: 'plat' },
      { x: 180, y: 160, w:  60, h: 16, type: 'plat' },
      { x: 330, y: 100, w:  60, h: 16, type: 'plat' },
    );
    for (let sx = 120; sx < 700; sx += 65)
      hazards.push({ x: sx, y: 376, w: 24, h: 14, type: 'spike' });
    enemies.push(
      makeEnemy(210, 264, 'walker'),
      makeEnemy(340, 204, 'walker'),
      makeEnemy(470, 144, 'walker'),
      makeEnemy(580, 204, 'walker'),
      makeEnemy(660, 274, 'patroller', 640, 755),
      makeEnemy(100, 375, 'patroller', 50, 200),
      makeGinger(150, 100), makeGinger(300, 70), makeGinger(460, 90),
      makeGinger(580, 80), makeGinger(700, 110),
      makeJimmy(380, 390, 1.0),   // ← THE REAL JIMMY
    );
    coins.push(...coinRow(185, 145, 3), ...coinRow(335, 85, 3), ...coinRow(455, 145, 3));
    flagX = 745;
  }

  const flag = { x: flagX, y: 300, w: 20, h: 90 };

  // ── GUN PICKUPS (added by Pratchetty) ──────────────────────────────────
  const guns = [];
  if (n === 1) {
    guns.push({ x: 320, y: 355, w: 28, h: 18, collected: false });
  } else if (n === 2) {
    guns.push({ x: 280, y: 245, w: 28, h: 18, collected: false });
    guns.push({ x: 520, y: 355, w: 28, h: 18, collected: false });
  } else {
    guns.push({ x: 220, y: 355, w: 28, h: 18, collected: false });
    guns.push({ x: 490, y: 135, w: 28, h: 18, collected: false });
  }

  return { platforms, hazards, enemies, coins, flag, spits: [], guns, bullets: [],
    // ── SQUASHIES (added by TheMediocreLlama) ────────────────────────────
    squashies: n === 1
      ? [{ x: 480, y: 272, w: 22, h: 22, collected: false }]
      : n === 2
      ? [{ x: 160, y: 162, w: 22, h: 22, collected: false }, { x: 630, y: 252, w: 22, h: 22, collected: false }]
      : [{ x: 355, y: 82, w: 22, h: 22, collected: false }, { x: 575, y: 202, w: 22, h: 22, collected: false }],
    // ── GINGER BABIES (added by Middors) ─────────────────────────────────
    gingerBabies: n === 1
      ? [{ x: 620, y: 358, w: 24, h: 28, collected: false }]
      : n === 2
      ? [{ x: 100, y: 292, w: 24, h: 28, collected: false }, { x: 480, y: 212, w: 24, h: 28, collected: false }]
      : [{ x: 215, y: 262, w: 24, h: 28, collected: false }, { x: 470, y: 142, w: 24, h: 28, collected: false }]
  };
}

function makeEnemy(x, y, type, patrolA, patrolB) {
  return {
    x, y: y - 28, w: 32, h: 28,
    vx: type === 'patroller' ? 1.2 : 1.5,
    type,
    patrolA: patrolA ?? x - 60,
    patrolB: patrolB ?? x + 60,
    dead: false,
    deadTimer: 0,
    frame: 0,
    frameTimer: 0,
  };
}

// ── GINGER FLYING ENEMY (added by Pratchetty) ─────────────────────────────
function makeGinger(x, y) {
  return {
    x, y,
    w: 36, h: 36,
    type: 'ginger',
    baseY: y,
    vx: 1.2 + Math.random() * 0.8,
    vy: 0,
    patrolA: x - 140,
    patrolB: x + 140,
    floatTimer: Math.random() * Math.PI * 2,
    dead: false,
    deadTimer: 0,
    frame: 0,
    frameTimer: 0,
  };
}

// ── JIMMY THE TWERKING FROG (added by Pratchetty) ─────────────────────────
function makeJimmy(x, y, scale = 1) {
  const w = Math.round(64 * scale), h = Math.round(70 * scale);
  return {
    x, y: y - h, w, h,
    scale,
    vx: 0, vy: 0,
    type: 'jimmy',
    patrolA: x - Math.round(180 * scale),
    patrolB: x + Math.round(180 * scale),
    moveDir: 1,
    dead: false,
    deadTimer: 0,
    hp: Math.max(1, Math.round(5 * scale)),
    maxHp: Math.max(1, Math.round(5 * scale)),
    frame: 0,
    frameTimer: 0,
    twerk: 0,
    twerkDir: 1,
    jumpTimer: 0,
    onGround: false,
    nameTag: true,
  };
}

function coinRow(startX, y, count) {
  const c = [];
  for (let i = 0; i < count; i++)
    c.push({ x: startX + i * 24, y, w: 14, h: 14, collected: false });
  return c;
}

// ── GAME VARS ───────────────────────────────────────────────────────────────
let llama, lvlData, keys = {}, particles = [], screenShake = 0;
let deathTimer = 0, winTimer = 0;
// ── ATOMIC TIMER (added by Pratchetty) ────────────────────────────────────
const TIMER_START = 60 * 60; // 60 seconds at 60fps
let bombTimer = TIMER_START;
let atomicExplosion = null; // { frame, x, y } when triggered

function startGame() {
  score = 0; lives = 3; level = 1;
  bombTimer = TIMER_START;
  atomicExplosion = null;
  loadLevel();
  state = 'playing';
  hideOverlay();
  updateHUD();
}

function loadLevel() {
  lvlData = buildLevel(level);
  const start = lvlData.platforms.find(p => p.type === 'ground');
  llama = makeLlama(60, start.y - 48);
}

function nextLevel() {
  level++;
  if (level > 5) { winGame(); return; }
  addTime(20 * 60); // +20s for reaching a flag
  loadLevel();
  state = 'playing';
  hideOverlay();
  updateHUD();
}

// ── ADD TIME (added by Pratchetty) ─────────────────────────────────────────
function addTime(frames) {
  bombTimer = Math.min(bombTimer + frames, TIMER_START * 2);
  updateHUD();
}

function winGame() {
  state = 'win';
  showOverlay(`🎉 YOU WIN! 🎉`, `Final Score: ${score}`, 'PRESS ENTER TO PLAY AGAIN');
}

function playerDie() {
  if (llama.invincible > 0 || llama.dead) return;
  llama.dead = true;
  lives--;
  screenShake = 20;
  spawnParticles(llama.x + llama.w/2, llama.y + llama.h/2, '#f5c542', 20);
  updateHUD();
  if (lives <= 0) {
    state = 'gameover';
    deathTimer = 120;
    showOverlay('GAME OVER', `Score: ${score}`, 'PRESS ENTER TO RETRY');
  } else {
    deathTimer = 60;
    state = 'dead';
  }
}

function respawn() {
  const start = lvlData.platforms.find(p => p.type === 'ground');
  llama = makeLlama(60, start.y - 48);
  state = 'playing';
}

// ── PARTICLES ───────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 2,
      life: 40 + Math.random() * 20,
      maxLife: 60,
      color,
      r: 3 + Math.random() * 4
    });
  }
}

// ── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('livesDisplay').textContent = '🦙'.repeat(Math.max(0, lives));
  document.getElementById('levelDisplay').textContent = level;
  document.getElementById('ammoDisplay').textContent = llama ? '🔫' + (llama.gunAmmo > 0 ? '●'.repeat(llama.gunAmmo) : '—') : '—';
  document.getElementById('squashieDisplay').textContent = (llama && llama.squashiePower > 0)
    ? '🍬 ' + Math.ceil(llama.squashiePower / 60) + 's'
    : '🍬—';
  document.getElementById('wigDisplay').textContent = (llama && llama.gingerWig > 0)
    ? '👶 ' + Math.ceil(llama.gingerWig / 60) + 's'
    : '👶—';
  const secs = Math.ceil(bombTimer / 60);
  const mins = Math.floor(secs / 60);
  const s    = secs % 60;
  const timerEl = document.getElementById('timerDisplay');
  timerEl.textContent = `${mins}:${String(s).padStart(2,'0')}`;
  timerEl.style.color = bombTimer < 600 ? (Math.floor(frameCount / 10) % 2 === 0 ? '#ff2222' : '#ffaa00') : '#f5c542';
}

// ── OVERLAY ──────────────────────────────────────────────────────────────────
function showOverlay(title, sub, cta) {
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <h2>${title}</h2>
    <p>${sub || ''}</p>
    ${cta ? `<p class="blink">${cta}</p>` : ''}
  `;
}
function hideOverlay() { overlay.style.display = 'none'; }

// ── INPUT ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Enter') {
    if (state === 'title' || state === 'gameover' || state === 'win') startGame();
  }
  if (e.code === 'Space' && state === 'playing') {
    e.preventDefault();
    trySpit();
  }
  if ((e.code === 'KeyG' || e.code === 'KeyF') && state === 'playing') {
    tryShoot();
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── TOUCH CONTROLS (added by Pratchetty) ──────────────────────────────────
function bindTouchBtn(id, keyCode, onPress) {
  const btn = document.getElementById(id);
  if (!btn) return;
  const press = (e) => {
    e.preventDefault();
    btn.classList.add('pressed');
    if (onPress) { onPress(); return; }
    keys[keyCode] = true;
  };
  const release = (e) => {
    e.preventDefault();
    btn.classList.remove('pressed');
    if (!onPress) keys[keyCode] = false;
  };
  btn.addEventListener('touchstart', press, { passive: false });
  btn.addEventListener('touchend',   release, { passive: false });
  btn.addEventListener('touchcancel',release, { passive: false });
  // also support mouse for desktop testing
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup',   release);
  btn.addEventListener('mouseleave',release);
}

bindTouchBtn('btn-left',  'ArrowLeft');
bindTouchBtn('btn-right', 'ArrowRight');
bindTouchBtn('btn-jump',  'ArrowUp');
bindTouchBtn('btn-spit',  null, () => { if (state === 'playing') trySpit(); });
bindTouchBtn('btn-shoot', null, () => { if (state === 'playing') tryShoot(); });

// Tap overlay to start/continue on mobile
document.getElementById('overlay').addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (state === 'title' || state === 'gameover' || state === 'win') startGame();
  else if (state === 'levelclear') nextLevel();
}, { passive: false });

// Scale canvas to fit wrapper (AtomSmasher101 — works on all screen sizes)
function resizeCanvas() {
  const canvas  = document.getElementById('gameCanvas');
  const wrapper = document.getElementById('gameWrapper');
  const wrapW   = wrapper.clientWidth;
  const wrapH   = wrapper.clientHeight;
  if (!wrapW || !wrapH) return;
  const scale = Math.min(wrapW / 800, wrapH / 450);
  canvas.style.width  = Math.floor(800 * scale) + 'px';
  canvas.style.height = Math.floor(450 * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 200);

function trySpit() {
  if (llama.spitCooldown > 0) return;
  llama.spitCooldown = 40;
  lvlData.spits.push({
    x: llama.facing === 1 ? llama.x + llama.w : llama.x - 16,
    y: llama.y + 10,
    w: 16, h: 10,
    vx: llama.facing * 10,
    vy: -1,
    life: 60
  });
}

// ── GUN SHOOT (added by Pratchetty) ───────────────────────────────────────
function tryShoot() {
  if (llama.gunAmmo <= 0 || llama.shootCooldown > 0) return;
  llama.gunAmmo--;
  llama.shootCooldown = 18;
  updateHUD();
  lvlData.bullets.push({
    x: llama.facing === 1 ? llama.x + llama.w : llama.x - 14,
    y: llama.y + llama.h * 0.45 - 3,
    w: 14, h: 6,
    vx: llama.facing * 16,
    life: 50
  });
  // muzzle flash particle burst
  spawnParticles(
    llama.facing === 1 ? llama.x + llama.w + 4 : llama.x - 4,
    llama.y + llama.h * 0.45, '#fff8aa', 6
  );
}

// ── COLLISION HELPERS ────────────────────────────────────────────────────────
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update() {
  frameCount++;

  // ── ATOMIC EXPLOSION animation (added by Pratchetty) ──────────────────
  if (atomicExplosion) {
    atomicExplosion.frame++;
    updateParticles();
    if (atomicExplosion.frame > 180) {
      atomicExplosion = null;
      state = 'gameover';
      showOverlay('☢️ ATOMIC ANNIHILATION ☢️', `The llama is nuclear dust.<br>Score: ${score}`, 'PRESS ENTER TO RETRY');
    }
    return;
  }

  if (state === 'dead') {
    deathTimer--;
    if (deathTimer <= 0) respawn();
    updateParticles();
    return;
  }
  if (state !== 'playing') { updateParticles(); return; }

  // ── Tick bomb timer ────────────────────────────────────────────────────
  bombTimer--;
  if (bombTimer % 60 === 0) updateHUD(); // update display every second
  if (bombTimer <= 0) {
    // BOOM
    bombTimer = 0;
    atomicExplosion = { frame: 0, x: llama ? llama.x + llama.w/2 : W/2, y: llama ? llama.y + llama.h/2 : H/2 };
    screenShake = 60;
    // massive particle burst
    for (let i = 0; i < 80; i++) spawnParticles(W/2, H/2, i % 3 === 0 ? '#ff4400' : i % 3 === 1 ? '#ffcc00' : '#ffffff', 1);
    return;
  }

  const { platforms, hazards, enemies, coins, flag } = lvlData;
  const spits = lvlData.spits;
  const bullets = lvlData.bullets;
  const guns = lvlData.guns;
  const squashies = lvlData.squashies;
  const gingerBabies = lvlData.gingerBabies;
  const left  = keys['ArrowLeft']  || keys['KeyA'];
  const right = keys['ArrowRight'] || keys['KeyD'];
  const jump  = keys['ArrowUp']    || keys['KeyW'] || keys['ArrowUp'];

  if (left)  { llama.vx = -MOVE_SPD; llama.facing = -1; }
  else if (right) { llama.vx =  MOVE_SPD; llama.facing =  1; }
  else llama.vx *= 0.7;

  llama.vy += GRAVITY;
  llama.x += llama.vx;
  llama.y += llama.vy;

  // clamp left
  if (llama.x < 0) llama.x = 0;

  // — Platform collision —
  llama.onGround = false;
  for (const p of platforms) {
    if (rectsOverlap(llama, p)) {
      const fromBelow = llama.vy < 0;
      const fromAbove = llama.vy >= 0;
      const overlapX  = Math.min(llama.x + llama.w, p.x + p.w) - Math.max(llama.x, p.x);
      const overlapY  = Math.min(llama.y + llama.h, p.y + p.h) - Math.max(llama.y, p.y);

      if (overlapY < overlapX) {
        if (fromAbove && llama.y + llama.h - llama.vy <= p.y + 2) {
          llama.y = p.y - llama.h;
          llama.vy = 0;
          llama.onGround = true;
        } else if (fromBelow) {
          llama.y = p.y + p.h;
          llama.vy = 0;
        }
      } else {
        llama.x -= overlapX * Math.sign(llama.vx || 1);
        llama.vx = 0;
      }
    }
  }

  // — Jump —
  if (jump && llama.onGround) llama.vy = JUMP_F;

  // — Fall off screen —
  if (llama.y > H + 50) playerDie();

  // — Hazard collision —
  if (llama.invincible <= 0 && llama.squashiePower <= 0) {
    for (const h of hazards) {
      if (rectsOverlap(llama, h)) { playerDie(); break; }
    }
  }

  // — Enemy update —
  for (const e of enemies) {
    if (e.dead) {
      e.deadTimer--;
      continue;
    }

    // ── GINGER flying enemy logic (added by Pratchetty) ─────────
    if (e.type === 'ginger') {
      e.floatTimer += 0.06;
      e.x += e.vx;
      if (e.x <= e.patrolA || e.x + e.w >= e.patrolB) e.vx *= -1;
      e.y = e.baseY + Math.sin(e.floatTimer) * 22;
      e.frameTimer++;
      if (e.frameTimer > 8) { e.frame = (e.frame + 1) % 4; e.frameTimer = 0; }

      if (llama.invincible <= 0 && llama.squashiePower <= 0 && rectsOverlap(llama, e)) {
        const stompZone = { x: e.x + 2, y: e.y, w: e.w - 4, h: 8 };
        if (llama.vy > 0 && rectsOverlap({ x: llama.x, y: llama.y + llama.h - 12, w: llama.w, h: 12 }, stompZone)) {
          e.dead = true; e.deadTimer = 30;
          llama.vy = -8;
          score += 200; addTime(4 * 60); updateHUD();
          spawnParticles(e.x + e.w/2, e.y, '#e8660a', 14);
        } else {
          playerDie();
        }
      }
      continue;
    }

    // ── JIMMY special logic ──────────────────────────────────
    if (e.type === 'jimmy') {
      e.twerk += 0.18;
      e.vy = (e.vy || 0) + GRAVITY;
      // hop periodically
      e.jumpTimer++;
      if (e.jumpTimer > 90 && e.onGround) {
        e.vy = -10 - Math.random() * 4;
        e.jumpTimer = 0;
      }
      // chase llama slowly
      const dx = (llama.x + llama.w/2) - (e.x + e.w/2);
      e.vx += Math.sign(dx) * 0.08;
      e.vx = Math.max(-2.5, Math.min(2.5, e.vx));
      e.x += e.vx;
      e.y += e.vy;
      // clamp to level bounds
      if (e.x < 0) e.x = 0;
      if (e.x + e.w > W) e.x = W - e.w;
      // platform collision
      e.onGround = false;
      for (const p of platforms) {
        if (rectsOverlap(e, p)) {
          if (e.vy >= 0 && e.y + e.h - e.vy <= p.y + 4) {
            e.y = p.y - e.h;
            e.vy = 0;
            e.onGround = true;
          }
        }
      }
      if (e.y > H + 80) { e.y = platforms[0].y - e.h; e.vy = 0; }
      e.frameTimer++;
      if (e.frameTimer > 6) { e.frame = (e.frame + 1) % 4; e.frameTimer = 0; }

      // stomp check (needs 3 stomps to kill Jimmy)
      if (llama.invincible <= 0 && llama.squashiePower <= 0 && rectsOverlap(llama, e)) {
        const stompZone = { x: e.x + 4, y: e.y, w: e.w - 8, h: 10 };
        if (llama.vy > 0 && rectsOverlap({ x: llama.x, y: llama.y + llama.h - 12, w: llama.w, h: 12 }, stompZone)) {
          e.hp--;
          llama.vy = -10;
          llama.invincible = 40;
          score += 50; addTime(2 * 60); updateHUD();
          spawnParticles(e.x + e.w/2, e.y, '#00cc44', 14);
          if (e.hp <= 0) {
            e.dead = true; e.deadTimer = 60;
            score += 500; addTime(10 * 60); updateHUD();
            spawnParticles(e.x + e.w/2, e.y + e.h/2, '#00ff88', 40);
          }
        } else if (llama.invincible <= 0) {
          playerDie();
        }
      }
      continue;
    }

    // ── standard enemy logic ─────────────────────────────────
    e.x += e.vx;
    if (e.x <= e.patrolA || e.x + e.w >= e.patrolB) e.vx *= -1;
    e.vy = (e.vy || 0) + GRAVITY;
    e.y += e.vy;
    for (const p of platforms) {
      if (rectsOverlap(e, p)) {
        const ov = Math.min(e.y + e.h, p.y + p.h) - Math.max(e.y, p.y);
        if (e.vy >= 0 && e.y + e.h - e.vy <= p.y + 4) {
          e.y = p.y - e.h;
          e.vy = 0;
        }
      }
    }
    e.frameTimer++;
    if (e.frameTimer > 10) { e.frame = (e.frame + 1) % 2; e.frameTimer = 0; }

    // stomp check (skip during squashie power — handled separately)
    if (llama.invincible <= 0 && llama.squashiePower <= 0 && rectsOverlap(llama, e)) {
      const stompZone = { x: e.x + 2, y: e.y, w: e.w - 4, h: 8 };
      if (llama.vy > 0 && rectsOverlap({ x: llama.x, y: llama.y + llama.h - 12, w: llama.w, h: 12 }, stompZone)) {
        e.dead = true; e.deadTimer = 30;
        llama.vy = -8;
        score += 100; addTime(3 * 60); updateHUD();
        spawnParticles(e.x + e.w/2, e.y, '#e74c3c', 12);
      } else {
        playerDie();
      }
    }
  }

  // — Spit update —
  for (let i = spits.length - 1; i >= 0; i--) {
    const s = spits[i];
    s.x += s.vx; s.y += s.vy;
    s.life--;
    if (s.life <= 0 || s.x < 0 || s.x > W) { spits.splice(i, 1); continue; }
    for (const e of enemies) {
      if (!e.dead && rectsOverlap(s, e)) {
        if (e.type === 'jimmy') {
          e.hp--;
          spits.splice(i, 1);
          spawnParticles(e.x + e.w/2, e.y, '#00cc44', 10);
          if (e.hp <= 0) {
            e.dead = true; e.deadTimer = 60;
            score += 500; addTime(10 * 60); updateHUD();
            spawnParticles(e.x + e.w/2, e.y + e.h/2, '#00ff88', 40);
          } else {
            score += 50; addTime(2 * 60); updateHUD();
          }
        } else {
          e.dead = true; e.deadTimer = 30;
          spits.splice(i, 1);
          score += 150; addTime(3 * 60); updateHUD();
          spawnParticles(e.x + e.w/2, e.y, '#27ae60', 12);
        }
        break;
      }
    }
  }

  // — Coins —
  for (const c of coins) {
    if (!c.collected && rectsOverlap(llama, c)) {
      c.collected = true;
      score += 50; addTime(1 * 60); updateHUD();
      spawnParticles(c.x + 7, c.y + 7, '#f5c542', 8);
    }
  }

  // — Gun pickups (added by Pratchetty) —
  for (const g of guns) {
    if (!g.collected && rectsOverlap(llama, g)) {
      g.collected = true;
      llama.gunAmmo = Math.min((llama.gunAmmo || 0) + 3, 9);
      updateHUD();
      spawnParticles(g.x + g.w/2, g.y + g.h/2, '#fff8aa', 14);
    }
  }

  // — Squashie powerup (added by TheMediocreLlama) —
  for (const s of squashies) {
    if (!s.collected && rectsOverlap(llama, s)) {
      s.collected = true;
      llama.squashiePower = 600; // 10 seconds of pure power
      updateHUD();
      spawnParticles(s.x + s.w/2, s.y + s.h/2, '#ff69b4', 30);
      spawnParticles(s.x + s.w/2, s.y + s.h/2, '#ff00ff', 20);
    }
  }
  if (llama.squashiePower > 0) {
    llama.squashiePower--;
    // While powered up: touching enemies kills them instead of you
    for (const e of enemies) {
      if (!e.dead && rectsOverlap(llama, e)) {
        if (e.type === 'jimmy') {
          e.hp = 0; e.dead = true; e.deadTimer = 60;
          score += 500; addTime(10 * 60); updateHUD();
          spawnParticles(e.x + e.w/2, e.y + e.h/2, '#ff69b4', 40);
        } else {
          e.dead = true; e.deadTimer = 30;
          score += 300; addTime(3 * 60); updateHUD();
          spawnParticles(e.x + e.w/2, e.y + e.h/2, '#ff69b4', 16);
        }
      }
    }
  }

  // — Bullets (added by Pratchetty) —
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.life--;
    if (b.life <= 0 || b.x < 0 || b.x > W) { bullets.splice(i, 1); continue; }
    let hit = false;
    for (const e of enemies) {
      if (!e.dead && rectsOverlap(b, { x: e.x, y: e.y, w: e.w, h: e.h })) {
        if (e.type === 'jimmy') {
          e.hp--;
          spawnParticles(b.x, b.y, '#fff8aa', 10);
          if (e.hp <= 0) {
            e.dead = true; e.deadTimer = 60;
            score += 500; addTime(10 * 60); updateHUD();
            spawnParticles(e.x + e.w/2, e.y + e.h/2, '#00ff88', 40);
          } else { score += 50; addTime(2 * 60); updateHUD(); }
        } else {
          e.dead = true; e.deadTimer = 30;
          score += 200; addTime(3 * 60); updateHUD();
          spawnParticles(e.x + e.w/2, e.y + e.h/2, '#fff8aa', 14);
        }
        hit = true; break;
      }
    }
    if (hit) { bullets.splice(i, 1); }
  }

  if (llama.shootCooldown > 0) llama.shootCooldown--;

  // — Ginger baby collectibles (added by Middors) —
  for (const b of gingerBabies) {
    if (!b.collected && rectsOverlap(llama, b)) {
      b.collected = true;
      llama.gingerWig = 600; // 10 seconds
      score += 250; addTime(5 * 60); updateHUD();
      spawnParticles(b.x + b.w/2, b.y + b.h/2, '#e8440a', 20);
      spawnParticles(b.x + b.w/2, b.y + b.h/2, '#ffcc00', 10);
    }
  }
  if (llama.gingerWig > 0) llama.gingerWig--;

  // — Flag (level end) —
  if (rectsOverlap(llama, { x: flag.x, y: flag.y, w: flag.w, h: flag.h })) {
    state = 'levelclear';
    winTimer = 90;
    score += 500 + level * 200;
    addTime(20 * 60); // +20s for reaching the flag
    updateHUD();
    spawnParticles(flag.x + 10, flag.y + 45, '#f5c542', 30);
    showOverlay(`LEVEL ${level} CLEAR! 🎉`, `Score: ${score} | +20s ⏱`, 'PRESS ENTER TO CONTINUE');
  }

  // — Invincibility —
  if (llama.invincible > 0) llama.invincible--;
  if (llama.spitCooldown > 0) llama.spitCooldown--;

  // — Animate llama —
  llama.frameTimer++;
  if (llama.frameTimer > 8) { llama.frame = (llama.frame + 1) % 4; llama.frameTimer = 0; }

  // — Screen shake decay —
  if (screenShake > 0) screenShake -= 2;

  updateParticles();
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.2;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// — Enter to advance level clear —
document.addEventListener('keydown', e => {
  if (e.code === 'Enter' && state === 'levelclear') {
    nextLevel();
  }
});

// ── DRAW ───────────────────────────────────────────────────────────────────
function draw() {
  const shake = screenShake > 0 ? (Math.random() - 0.5) * screenShake * 0.5 : 0;
  ctx.save();
  ctx.translate(shake, shake * 0.5);

  // ── STAR SPANGLED SKY (added by SimpleHero09) ─────────────────────────────
  // Red & white stripes
  const stripeH = H / 13;
  for (let i = 0; i < 13; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#B22234' : '#FFFFFF';
    ctx.fillRect(0, i * stripeH, W, stripeH);
  }
  // Blue canton (top-left)
  const cantonW = W * 0.38, cantonH = stripeH * 7;
  ctx.fillStyle = '#3C3B6E';
  ctx.fillRect(0, 0, cantonW, cantonH);

  // 5-pointed stars in the canton
  function drawStar(cx, cy, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    for (let p = 0; p < 5; p++) {
      const outerA = (p * 4 * Math.PI / 5) - Math.PI / 2;
      const innerA = outerA + 2 * Math.PI / 10;
      if (p === 0) ctx.moveTo(cx + r * Math.cos(outerA), cy + r * Math.sin(outerA));
      else ctx.lineTo(cx + r * Math.cos(outerA), cy + r * Math.sin(outerA));
      ctx.lineTo(cx + (r * 0.4) * Math.cos(innerA), cy + (r * 0.4) * Math.sin(innerA));
    }
    ctx.closePath();
    ctx.fill();
  }

  // Twinkle offset for each star
  const cols = 6, rows = 5;
  const starPadX = cantonW / (cols + 0.5);
  const starPadY = cantonH / (rows + 0.5);
  let starIdx = 0;
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const offX = (row % 2 === 1) ? starPadX * 0.5 : 0;
      const sx = starPadX * 0.75 + col * starPadX + offX;
      const sy = starPadY * 0.75 + row * starPadY;
      const twinkle = 0.6 + Math.sin(frameCount * 0.07 + starIdx * 1.3) * 0.4;
      ctx.globalAlpha = twinkle;
      drawStar(sx, sy, 7, '#FFFFFF');
      starIdx++;
    }
  }
  ctx.globalAlpha = 1;

  // Extra twinkling stars scattered across the stripes
  for (let i = 0; i < 25; i++) {
    const sx = cantonW + ((i * 97 + 50) % (W - cantonW));
    const sy = (i * 61) % (stripeH * 6);
    const twinkle = 0.4 + Math.sin(frameCount * 0.09 + i * 2.1) * 0.4;
    ctx.globalAlpha = twinkle;
    drawStar(sx, sy, 4, i % 2 === 0 ? '#3C3B6E' : '#B22234');
  }
  ctx.globalAlpha = 1;

  if (!lvlData) { ctx.restore(); return; }
  const { platforms, hazards, enemies, coins, flag, spits } = lvlData;

  // Platforms
  for (const p of platforms) {
    if (p.type === 'ground') {
      ctx.fillStyle = rb(p.x * 0.3);
      ctx.fillRect(p.x, p.y, p.w, 12);
      ctx.fillStyle = rbDark(p.x * 0.3 + 40);
      ctx.fillRect(p.x, p.y + 12, p.w, p.h - 12);
      ctx.fillStyle = rbLight(p.x * 0.3 + 20);
      for (let gx = p.x + 8; gx < p.x + p.w - 8; gx += 20) {
        ctx.fillRect(gx, p.y - 3, 4, 5);
        ctx.fillRect(gx + 8, p.y - 2, 3, 4);
      }
    } else {
      ctx.fillStyle = rbDark(p.x * 0.5 + 80);
      ctx.fillRect(p.x, p.y + 8, p.w, p.h);
      ctx.fillStyle = rb(p.x * 0.5);
      ctx.fillRect(p.x, p.y, p.w, 10);
      ctx.fillStyle = rbLight(p.x * 0.5 + 30);
      ctx.fillRect(p.x + 2, p.y - 2, p.w - 4, 4);
    }
  }

  // Hazards (spikes)
  for (const h of hazards) {
    const count = Math.floor(h.w / 8);
    for (let i = 0; i < count; i++) {
      ctx.fillStyle = rb(h.x + i * 30);
      ctx.beginPath();
      ctx.moveTo(h.x + i * 8, h.y + h.h);
      ctx.lineTo(h.x + i * 8 + 4, h.y);
      ctx.lineTo(h.x + i * 8 + 8, h.y + h.h);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = rbLight(h.x + i * 30 + 20);
      ctx.beginPath();
      ctx.moveTo(h.x + i * 8 + 1, h.y + h.h - 2);
      ctx.lineTo(h.x + i * 8 + 4, h.y + 2);
      ctx.lineTo(h.x + i * 8 + 7, h.y + h.h - 2);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Coins
  for (const c of coins) {
    if (c.collected) continue;
    const bob = Math.sin(frameCount * 0.1 + c.x) * 3;
    ctx.save();
    ctx.translate(c.x + 7, c.y + 7 + bob);
    ctx.fillStyle = rb(c.x + c.y);
    ctx.shadowBlur = 10; ctx.shadowColor = rb(c.x + c.y);
    ctx.beginPath();
    ctx.arc(0, 0, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = rbLight(c.x + c.y + 40);
    ctx.font = '8px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('$', 0, 1);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Gun pickups (added by Pratchetty)
  for (const g of lvlData.guns) {
    if (g.collected) continue;
    const bob = Math.sin(frameCount * 0.08 + g.x) * 3;
    ctx.save();
    ctx.translate(g.x + g.w/2, g.y + g.h/2 + bob);
    // glow
    ctx.shadowBlur = 16; ctx.shadowColor = '#fff8aa';
    // barrel
    ctx.fillStyle = '#333';
    ctx.fillRect(-10, -3, 18, 6);
    // body
    ctx.fillStyle = '#888';
    ctx.fillRect(-10, -5, 14, 10);
    // handle
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(-6, 3, 8, 8);
    // trigger
    ctx.fillStyle = '#aaa';
    ctx.fillRect(-2, 1, 2, 5);
    // barrel tip
    ctx.fillStyle = '#555';
    ctx.fillRect(7, -2, 5, 4);
    // ammo dots
    ctx.fillStyle = '#fff8aa';
    for (let d = 0; d < 3; d++) {
      ctx.beginPath();
      ctx.arc(-8 + d * 5, -8, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Bullets (added by Pratchetty)
  for (const b of lvlData.bullets) {
    ctx.save();
    ctx.shadowBlur = 10; ctx.shadowColor = '#fff8aa';
    ctx.fillStyle = '#fff8aa';
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, 7, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff9900';
    ctx.beginPath();
    ctx.ellipse(b.x - b.vx * 0.3, b.y, 4, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
  const f = flag;

  // Squashie powerups (added by TheMediocreLlama)
  for (const s of lvlData.squashies) {
    if (s.collected) continue;
    const bob = Math.sin(frameCount * 0.1 + s.x) * 4;
    ctx.save();
    ctx.translate(s.x + s.w/2, s.y + s.h/2 + bob);
    const glowSize = 14 + Math.sin(frameCount * 0.15) * 5;
    ctx.shadowBlur = glowSize; ctx.shadowColor = '#ff69b4';
    // body
    ctx.fillStyle = '#ff69b4';
    ctx.beginPath(); ctx.ellipse(0, 0, 10, 11, 0, 0, Math.PI * 2); ctx.fill();
    // shine
    ctx.fillStyle = '#ffb6d9';
    ctx.beginPath(); ctx.ellipse(-3, -4, 4, 3, -0.4, 0, Math.PI * 2); ctx.fill();
    // face
    ctx.fillStyle = '#c0006a';
    ctx.beginPath(); ctx.arc(-3, 1, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 3, 1, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#c0006a'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 4, 3, 0, Math.PI); ctx.stroke();
    // top bump
    ctx.fillStyle = '#ff69b4';
    ctx.beginPath(); ctx.ellipse(0, -10, 4, 3, 0, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
  // Ginger baby collectibles (added by Middors)
  for (const b of lvlData.gingerBabies) {
    if (b.collected) continue;
    const bob = Math.sin(frameCount * 0.09 + b.x) * 3;
    ctx.save();
    ctx.translate(b.x + b.w/2, b.y + b.h/2 + bob);

    // glow
    ctx.shadowBlur = 14; ctx.shadowColor = '#e8440a';

    // nappy / body
    ctx.fillStyle = '#fff8f0';
    ctx.beginPath(); ctx.ellipse(0, 6, 10, 8, 0, 0, Math.PI*2); ctx.fill();
    // nappy pin
    ctx.fillStyle = '#88aaff';
    ctx.beginPath(); ctx.arc(0, 6, 2, 0, Math.PI*2); ctx.fill();

    // chubby torso
    ctx.fillStyle = '#ffe0c0';
    ctx.beginPath(); ctx.ellipse(0, -2, 8, 7, 0, 0, Math.PI*2); ctx.fill();

    // little arms
    ctx.fillStyle = '#ffe0c0';
    ctx.beginPath(); ctx.ellipse(-10, 0, 4, 3, -0.4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 10, 0, 4, 3,  0.4, 0, Math.PI*2); ctx.fill();

    // head
    ctx.fillStyle = '#ffe0c0';
    ctx.beginPath(); ctx.ellipse(0, -12, 9, 9, 0, 0, Math.PI*2); ctx.fill();

    // GINGER HAIR (the whole point)
    ctx.fillStyle = '#e8440a';
    ctx.beginPath(); ctx.ellipse(0, -19, 7, 4, 0, 0, Math.PI*2); ctx.fill();
    // wild ginger tufts
    for (let t = -2; t <= 2; t++) {
      ctx.beginPath();
      ctx.moveTo(t * 3 - 1, -20);
      ctx.lineTo(t * 3, -20 - 5 - Math.abs(t) * 1.5);
      ctx.lineTo(t * 3 + 1, -20);
      ctx.closePath(); ctx.fill();
    }

    // eyes (big baby eyes)
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-3, -12, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 3, -12, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3a1a00';
    ctx.beginPath(); ctx.arc(-3, -12, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 3, -12, 1.5, 0, Math.PI*2); ctx.fill();
    // shine
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-2.2, -12.8, 0.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 3.8, -12.8, 0.8, 0, Math.PI*2); ctx.fill();

    // smile
    ctx.strokeStyle = '#c06040'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(0, -10, 3, 0.2, Math.PI - 0.2); ctx.stroke();

    // rosy cheeks
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#ff8888';
    ctx.beginPath(); ctx.ellipse(-5, -10, 3, 2, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 5, -10, 3, 2, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;

    ctx.shadowBlur = 0;
    ctx.restore();
  }
  const wave = Math.sin(frameCount * 0.1) * 4;
  ctx.fillStyle = rb(frameCount * 4);
  ctx.beginPath();
  ctx.moveTo(f.x + 12, f.y + 4);
  ctx.quadraticCurveTo(f.x + 28 + wave, f.y + 14, f.x + 12, f.y + 24);
  ctx.closePath(); ctx.fill();

  // Enemies
  for (const e of enemies) {
    if (e.dead) {
      if (e.deadTimer > 0) {
        ctx.globalAlpha = e.deadTimer / (e.type === 'jimmy' ? 60 : 30);
        ctx.fillStyle = e.type === 'jimmy' ? '#00ff88' : '#e74c3c';
        ctx.beginPath();
        ctx.arc(e.x + e.w/2, e.y + e.h/2, e.w/2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      continue;
    }
    if (e.type === 'jimmy') drawJimmy(e);
    else if (e.type === 'ginger') drawGinger(e);
    else drawEnemy(e);
  }

  // Spits — radioactive (added by Hayley_ht)
  for (const s of lvlData.spits) {
    ctx.save();
    ctx.translate(s.x + s.w / 2, s.y + s.h / 2);

    // outer toxic glow
    const glow = ctx.createRadialGradient(0, 0, 2, 0, 0, 14);
    glow.addColorStop(0,   'rgba(57,255,20, 0.9)');
    glow.addColorStop(0.4, 'rgba(100,255,0, 0.5)');
    glow.addColorStop(1,   'rgba(0,80,0, 0)');
    ctx.fillStyle = glow;
    ctx.shadowBlur = 18; ctx.shadowColor = '#39ff14';
    ctx.beginPath();
    ctx.arc(0, 0, 14, 0, Math.PI * 2);
    ctx.fill();

    // wobbly blob body
    const wobble = Math.sin(frameCount * 0.3 + s.x) * 1.5;
    ctx.fillStyle = '#39ff14';
    ctx.beginPath();
    ctx.ellipse(0, wobble, 9, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // drip underneath
    ctx.fillStyle = '#1aaa00';
    ctx.beginPath();
    ctx.ellipse(0, 5 + wobble, 3, 4 + Math.abs(wobble), 0, 0, Math.PI * 2);
    ctx.fill();

    // ☢ symbol
    ctx.font = '9px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#001a00';
    ctx.fillText('☢', 0, wobble);

    ctx.shadowBlur = 0;
    ctx.restore();

    // toxic drip trail particles (cheap: spawn every 4 frames)
    if (frameCount % 4 === 0) {
      particles.push({
        x: s.x + s.w / 2 + (Math.random() - 0.5) * 6,
        y: s.y + s.h / 2 + 4,
        vx: (Math.random() - 0.5) * 0.8,
        vy: 0.5 + Math.random() * 1,
        life: 18 + Math.random() * 12,
        maxLife: 30,
        color: '#39ff14',
        r: 2 + Math.random() * 2
      });
    }
  }

  // Llama
  if (state === 'playing' || state === 'dead' || state === 'levelclear') {
    const visible = state !== 'playing' || llama.invincible <= 0 || Math.floor(frameCount / 4) % 2 === 0;
    // Squashie powerup aura (added by TheMediocreLlama)
  if (llama.squashiePower > 0) {
    const auraAlpha = 0.3 + Math.sin(frameCount * 0.2) * 0.2;
    const auraSize  = 6 + Math.sin(frameCount * 0.15) * 4;
    ctx.globalAlpha = auraAlpha;
    ctx.fillStyle = '#ff69b4';
    ctx.shadowBlur = 20; ctx.shadowColor = '#ff00ff';
    ctx.beginPath();
    ctx.ellipse(llama.x + llama.w/2, llama.y + llama.h/2, llama.w/2 + auraSize, llama.h/2 + auraSize, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }
  if (visible) drawLlama(llama);
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * (p.life / p.maxLife), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ── ATOMIC EXPLOSION (added by Pratchetty) ────────────────────────────
  if (atomicExplosion) {
    const f = atomicExplosion.frame;
    const prog = f / 180;

    // Blinding white flash at start
    if (f < 20) {
      ctx.globalAlpha = 1 - f / 20;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }

    // Expanding fireball
    const fbR = Math.min(f * 8, W);
    const fbGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, fbR);
    fbGrad.addColorStop(0,   `rgba(255,255,255,${Math.max(0, 1 - prog * 1.5)})`);
    fbGrad.addColorStop(0.2, `rgba(255,220,50,${Math.max(0, 0.9 - prog)})`);
    fbGrad.addColorStop(0.5, `rgba(255,80,0,${Math.max(0, 0.7 - prog * 0.8)})`);
    fbGrad.addColorStop(1,   `rgba(80,0,0,0)`);
    ctx.fillStyle = fbGrad;
    ctx.beginPath();
    ctx.arc(W/2, H/2, fbR, 0, Math.PI*2);
    ctx.fill();

    // Mushroom stem
    if (f > 20) {
      const stemH = Math.min((f - 20) * 4, H * 0.7);
      const stemW = 30 + f * 0.2;
      const stemAlpha = Math.max(0, 0.8 - prog * 0.5);
      ctx.globalAlpha = stemAlpha;
      const stemGrad = ctx.createLinearGradient(W/2 - stemW, H, W/2 + stemW, H);
      stemGrad.addColorStop(0, '#331100');
      stemGrad.addColorStop(0.5, '#884400');
      stemGrad.addColorStop(1, '#331100');
      ctx.fillStyle = stemGrad;
      ctx.fillRect(W/2 - stemW/2, H - stemH, stemW, stemH);
      ctx.globalAlpha = 1;
    }

    // Mushroom cap
    if (f > 40) {
      const capR = Math.min((f - 40) * 3, 160);
      const capY  = Math.max(H/2 - 80, H - Math.min((f - 20) * 4, H * 0.7));
      ctx.globalAlpha = Math.max(0, 0.9 - prog * 0.6);
      const capGrad = ctx.createRadialGradient(W/2, capY, 0, W/2, capY, capR);
      capGrad.addColorStop(0,   '#ffcc00');
      capGrad.addColorStop(0.4, '#ff4400');
      capGrad.addColorStop(0.7, '#661100');
      capGrad.addColorStop(1,   'rgba(40,0,0,0)');
      ctx.fillStyle = capGrad;
      ctx.beginPath();
      ctx.ellipse(W/2, capY, capR, capR * 0.6, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // ☢️ symbol in the centre
    if (f > 30 && f < 140) {
      ctx.globalAlpha = Math.min(1, (f - 30) / 20) * Math.max(0, (140 - f) / 30);
      ctx.font = `bold ${60 + f * 0.3}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#ffff00';
      ctx.shadowBlur = 30; ctx.shadowColor = '#ff8800';
      ctx.fillText('☢️', W/2, H/2);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    // Screen-wide orange tint
    ctx.globalAlpha = Math.max(0, 0.4 - prog * 0.4);
    ctx.fillStyle = '#ff4400';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawLlama(l) {
  const x = l.x, y = l.y, w = l.w, h = l.h;
  const dir = l.facing;
  ctx.save();
  if (dir === -1) {
    ctx.translate(x + w, 0);
    ctx.scale(-1, 1);
    ctx.translate(-x, 0);
  }

  // Body
  ctx.fillStyle = rb(0);
  ctx.fillRect(x + 4, y + 18, w - 8, h - 22);

  // Neck
  ctx.fillStyle = rb(40);
  ctx.fillRect(x + w - 16, y + 8, 10, 20);

  // Head
  ctx.fillStyle = rb(80);
  ctx.fillRect(x + w - 18, y, 16, 14);

  // Ear
  ctx.fillStyle = rb(120);
  ctx.fillRect(x + w - 14, y - 7, 5, 8);
  ctx.fillRect(x + w - 8, y - 5, 4, 6);

  // ── GINGER WIG (added by Middors) ─────────────────────────────────────
  if (l.gingerWig > 0) {
    const wigAlpha = l.gingerWig < 120 ? l.gingerWig / 120 : 1; // fade out last 2s
    ctx.globalAlpha = wigAlpha;
    ctx.fillStyle = '#e8440a';
    // wig base covering the head
    ctx.beginPath();
    ctx.ellipse(x + w - 10, y - 2, 12, 7, 0, 0, Math.PI*2);
    ctx.fill();
    // wild ginger tufts sticking up
    for (let t = 0; t < 5; t++) {
      const tx = x + w - 20 + t * 5;
      const th = 8 + Math.sin(frameCount * 0.15 + t) * 2;
      ctx.beginPath();
      ctx.moveTo(tx, y - 6);
      ctx.lineTo(tx + 2, y - 6 - th);
      ctx.lineTo(tx + 4, y - 6);
      ctx.closePath(); ctx.fill();
    }
    // flowing side locks
    ctx.fillStyle = '#c83200';
    ctx.beginPath(); ctx.ellipse(x + w - 2, y + 2, 3, 7, 0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + w - 20, y + 2, 3, 6, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Eye
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(x + w - 10, y + 3, 3, 3);
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + w - 9, y + 3, 1, 1);

  // Snout
  ctx.fillStyle = rb(160);
  ctx.fillRect(x + w - 4, y + 6, 6, 6);
  ctx.fillStyle = rbDark(160);
  ctx.fillRect(x + w - 2, y + 9, 2, 2);

  // Legs
  const legOff = l.onGround ? (l.frame % 2 === 0 ? 2 : -2) : 0;
  ctx.fillStyle = rb(200);
  ctx.fillRect(x + 6,      y + h - 10 + legOff,  7, 10);
  ctx.fillStyle = rb(230);
  ctx.fillRect(x + 16,     y + h - 10 - legOff,  7, 10);
  ctx.fillStyle = rb(260);
  ctx.fillRect(x + w - 14, y + h - 10 - legOff,  7, 10);
  ctx.fillStyle = rb(290);
  ctx.fillRect(x + w - 8,  y + h - 10 + legOff,  7, 10);

  // Tail
  ctx.fillStyle = rb(320);
  ctx.fillRect(x, y + 18, 6, 8);

  // Radioactive spit charge glow (Hayley_ht)
  if (l.spitCooldown > 30) {
    ctx.globalAlpha = (l.spitCooldown - 30) / 10 * 0.7;
    ctx.fillStyle = '#39ff14';
    ctx.shadowBlur = 16; ctx.shadowColor = '#39ff14';
    ctx.beginPath();
    ctx.arc(x + w + 2, y + 14, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = '7px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#001a00';
    ctx.fillText('☢', x + w + 2, y + 14);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ── DRAW GINGER FLYING ENEMY (added by Pratchetty) ────────────────────────
function drawGinger(e) {
  const x = e.x, y = e.y, w = e.w, h = e.h;
  const t = e.floatTimer;
  const wingFlap = Math.sin(t * 4) * 18; // fast wing flap

  ctx.save();
  ctx.translate(x + w/2, y + h/2);

  // Wings (flapping)
  ctx.fillStyle = 'rgba(255, 160, 50, 0.85)';
  // left wing
  ctx.save();
  ctx.rotate((-30 + wingFlap) * Math.PI / 180);
  ctx.beginPath();
  ctx.ellipse(-18, -6, 18, 8, -0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  // right wing
  ctx.save();
  ctx.rotate((30 - wingFlap) * Math.PI / 180);
  ctx.beginPath();
  ctx.fillStyle = 'rgba(255, 160, 50, 0.85)';
  ctx.ellipse(18, -6, 18, 8, 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Body — round ginger biscuit shape
  ctx.fillStyle = '#c8520a';
  ctx.beginPath();
  ctx.ellipse(0, 0, 15, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Icing detail on body
  ctx.strokeStyle = '#ffe8cc';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(0, 0, 9, 8, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Ginger hair (the signature look)
  ctx.fillStyle = '#e8440a';
  // wild spiky hair tufts
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 5 - 2, -13);
    ctx.lineTo(i * 5, -13 - 7 - Math.abs(i) * 2);
    ctx.lineTo(i * 5 + 2, -13);
    ctx.closePath();
    ctx.fill();
  }

  // Freckles
  ctx.fillStyle = '#7a2a00';
  ctx.beginPath(); ctx.arc(-5, 2, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 5, 2, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-8, -2, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 8, -2, 1.5, 0, Math.PI*2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-5, -3, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 5, -3, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3a1a00';
  ctx.beginPath(); ctx.arc(-5, -3, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 5, -3, 2, 0, Math.PI*2); ctx.fill();
  // eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-4, -4, 1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 6, -4, 1, 0, Math.PI*2); ctx.fill();

  // Mouth (cheeky grin)
  ctx.strokeStyle = '#5a1a00';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-5, 5);
  ctx.quadraticCurveTo(0, 10, 5, 5);
  ctx.stroke();

  // Angry eyebrows
  ctx.strokeStyle = '#e8440a';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-8, -7); ctx.lineTo(-3, -5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 8, -7); ctx.lineTo( 3, -5); ctx.stroke();

  ctx.restore();
}

// ── DRAW JIMMY (added by Pratchetty) ──────────────────────────────────────
function drawJimmy(e) {
  const x = e.x, y = e.y, w = e.w, h = e.h;
  const t = e.twerk;
  const sc = e.scale || 1;

  // twerk: oscillate hips — upper body tilts opposite to lower
  const hipSwing   = Math.sin(t * 2) * 10;
  const bodySwing  = Math.sin(t * 2 + Math.PI) * 6;

  ctx.save();
  ctx.translate(x + w/2, y + h);
  ctx.scale(sc, sc); // scale everything relative to full-size Jimmy

  // ── Lower body / butt (the twerker) ──
  ctx.save();
  ctx.rotate((hipSwing * Math.PI) / 180);
  // Booty (large and proud — Hayley_Ht approved)
  ctx.fillStyle = rb(frameCount * 2 + 60);
  ctx.beginPath();
  ctx.ellipse(0, -18, 34, 26, 0, 0, Math.PI * 2);
  ctx.fill();
  // Booty highlight
  ctx.fillStyle = rbLight(frameCount * 2 + 100);
  ctx.beginPath();
  ctx.ellipse(-8, -22, 14, 10, -0.3, 0, Math.PI * 2);
  ctx.fill();
  // Hips
  ctx.fillStyle = rb(frameCount * 2 + 80);
  ctx.fillRect(-26, -32, 52, 32);
  // Legs
  const legL = Math.sin(t * 2) * 8;
  const legR = -legL;
  ctx.fillStyle = rb(frameCount * 2 + 40);
  // left leg
  ctx.save();
  ctx.translate(-12, 0);
  ctx.rotate((legL * Math.PI) / 180);
  ctx.fillRect(-6, 0, 12, 20);
  // left foot
  ctx.fillStyle = rbDark(frameCount * 2 + 60);
  ctx.fillRect(-8, 18, 18, 8);
  ctx.restore();
  // right leg
  ctx.save();
  ctx.translate(12, 0);
  ctx.rotate((legR * Math.PI) / 180);
  ctx.fillStyle = rb(frameCount * 2 + 40);
  ctx.fillRect(-6, 0, 12, 20);
  ctx.fillStyle = rbDark(frameCount * 2 + 60);
  ctx.fillRect(-10, 18, 18, 8);
  ctx.restore();
  ctx.restore();

  // ── Upper body ──
  ctx.save();
  ctx.rotate((bodySwing * Math.PI) / 180);
  // torso
  ctx.fillStyle = rb(frameCount * 2 + 160);
  ctx.fillRect(-18, -62, 36, 36);
  // belly spots
  ctx.fillStyle = rbLight(frameCount * 2 + 200);
  ctx.beginPath(); ctx.ellipse(0, -50, 10, 7, 0, 0, Math.PI*2); ctx.fill();

  // Arms (flailing with twerk)
  const armSwing = Math.sin(t * 2) * 30;
  ctx.fillStyle = rb(frameCount * 2 + 120);
  // left arm
  ctx.save();
  ctx.translate(-18, -52);
  ctx.rotate((-40 + armSwing) * Math.PI / 180);
  ctx.fillRect(-5, 0, 10, 22);
  // left hand
  ctx.fillStyle = rb(frameCount * 2 + 140);
  ctx.beginPath(); ctx.arc(0, 22, 7, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // right arm
  ctx.save();
  ctx.translate(18, -52);
  ctx.rotate((40 - armSwing) * Math.PI / 180);
  ctx.fillStyle = rb(frameCount * 2 + 120);
  ctx.fillRect(-5, 0, 10, 22);
  ctx.fillStyle = rb(frameCount * 2 + 140);
  ctx.beginPath(); ctx.arc(0, 22, 7, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Head
  ctx.fillStyle = rb(frameCount * 2 + 200);
  ctx.beginPath();
  ctx.ellipse(0, -72, 22, 18, 0, 0, Math.PI*2);
  ctx.fill();
  // Eyes (big bulgy frog eyes)
  ctx.fillStyle = '#ffff00';
  ctx.beginPath(); ctx.arc(-10, -80, 9, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 10, -80, 9, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-10, -80, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 10, -80, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-8, -82, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(12, -82, 2, 0, Math.PI*2); ctx.fill();
  // Mouth (wide frog grin)
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-14, -63);
  ctx.quadraticCurveTo(0, -55, 14, -63);
  ctx.stroke();
  // tongue
  if (Math.sin(t) > 0.7) {
    ctx.fillStyle = '#ff4466';
    ctx.beginPath();
    ctx.ellipse(0, -58, 7, 5, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(-28, -h/sc - 12, 56, 7);
  ctx.fillStyle = e.hp >= e.maxHp * 0.7 ? '#22cc44' : e.hp >= e.maxHp * 0.35 ? '#f5c542' : '#e74c3c';
  ctx.fillRect(-28, -h/sc - 12, (e.hp / e.maxHp) * 56, 7);
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
  ctx.strokeRect(-28, -h/sc - 12, 56, 7);

  // Name tag
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${sc < 0.7 ? 8 : 10}px "Press Start 2P", monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.shadowBlur = 6; ctx.shadowColor = sc < 1 ? '#ffaa00' : '#00ff88';
  ctx.fillText(sc < 1 ? 'baby jimmy' : 'JIMMY', 0, -h/sc - 14);
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawEnemy(e) {
  const x = e.x, y = e.y, w = e.w, h = e.h;
  ctx.fillStyle = rb(e.x + e.y);
  ctx.fillRect(x + 8, y + 6, 16, h - 6);
  ctx.fillRect(x, y + 12, 10, 8);
  ctx.fillRect(x + w - 10, y + 10, 10, 8);
  // Face
  ctx.fillStyle = '#1a1a1a';
  const blink = Math.floor(e.frameTimer / 5) % 8 === 0;
  if (!blink) {
    ctx.fillRect(x + 10, y + 10, 3, 3);
    ctx.fillRect(x + 19, y + 10, 3, 3);
  } else {
    ctx.fillRect(x + 10, y + 12, 3, 1);
    ctx.fillRect(x + 19, y + 12, 3, 1);
  }
  ctx.fillStyle = rb(e.x + e.y + 180);
  ctx.fillRect(x + 11, y + 17, 10, 2);
  // Spines
  ctx.fillStyle = rbDark(e.x + e.y + 90);
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(x + 6 + i * 6, y + 3 + (i % 2) * 2, 2, 5);
  }
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Init
showOverlay('🦙 MEDIOCRE LLAMA LEAP 🦙', 'Dodge spikes, stomp enemies,<br>and reach the flag!', 'PRESS ENTER TO START');
loop();
</script>
